# Playwright CI — aligned with .agents/skills/playwright-skill/ci/ci-github-actions.md (Pattern 1)
name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  PLAYWRIGHT_HTML_OPEN: never

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        id: playwright
        run: npx playwright test

      - name: Report TC-LP-001 to Google Sheet (Pass)
        if: success()
        env:
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -z "${SHEETS_WEBHOOK_URL:-}" ] || [ -z "${WEBHOOK_SECRET:-}" ]; then
            echo "Skipping Google Sheet: set SHEETS_WEBHOOK_URL and WEBHOOK_SECRET in repo Actions secrets."
            exit 0
          fi
          curl -sS -X POST "$SHEETS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg secret "$WEBHOOK_SECRET" \
              --arg testCaseId "TC-LP-001" \
              --arg result "Pass" \
              --arg sheetName "Login" \
              '{secret: $secret, testCaseId: $testCaseId, result: $result, sheetName: $sheetName}')"

      - name: Report TC-LP-001 to Google Sheet (Fail)
        if: failure() && steps.playwright.outcome == 'failure'
        env:
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -z "${SHEETS_WEBHOOK_URL:-}" ] || [ -z "${WEBHOOK_SECRET:-}" ]; then
            echo "Skipping Google Sheet: set SHEETS_WEBHOOK_URL and WEBHOOK_SECRET in repo Actions secrets."
            exit 0
          fi
          curl -sS -X POST "$SHEETS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg secret "$WEBHOOK_SECRET" \
              --arg testCaseId "TC-LP-001" \
              --arg result "Fail" \
              --arg sheetName "Login" \
              '{secret: $secret, testCaseId: $testCaseId, result: $result, sheetName: $sheetName}')"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces and test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
