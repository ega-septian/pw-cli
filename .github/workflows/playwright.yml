# Playwright CI — aligned with .agents/skills/playwright-skill/ci/ci-github-actions.md (Pattern 1)
# Sheet reporting is a separate job so you can "Re-run failed jobs" on webhook-only failures
# without re-running browser install + tests.
name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  PLAYWRIGHT_HTML_OPEN: never

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    outputs:
      playwright-outcome: ${{ steps.playwright-meta.outputs.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        id: playwright
        run: npx playwright test

      - name: Expose Playwright step outcome for later jobs
        id: playwright-meta
        if: always()
        run: echo "outcome=${{ steps.playwright.outcome }}" >> "$GITHUB_OUTPUT"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces and test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  report-sheet:
    name: Google Sheet — TC status
    needs: test
    if: always() && needs.test.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update TC status in Google Sheet
        env:
          PLAYWRIGHT_OUTCOME: ${{ needs.test.outputs.playwright-outcome }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: node scripts/ci-report-google-sheet.mjs
