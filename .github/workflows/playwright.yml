# Playwright CI — aligned with .agents/skills/playwright-skill/ci/ci-github-actions.md (Pattern 1)
# Sheet reporting is a separate job so you can "Re-run failed jobs" on webhook-only failures
# without re-running browser install + tests.
name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  PLAYWRIGHT_HTML_OPEN: never

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    outputs:
      playwright-outcome: ${{ steps.playwright-meta.outputs.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        id: playwright
        run: npx playwright test

      - name: Expose Playwright step outcome for later jobs
        id: playwright-meta
        if: always()
        run: echo "outcome=${{ steps.playwright.outcome }}" >> "$GITHUB_OUTPUT"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces and test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  report-sheet:
    name: Google Sheet — TC status
    needs: test
    if: always() && needs.test.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Update TC status in Google Sheet
        env:
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          pw="${{ needs.test.outputs.playwright-outcome }}"
          if [ "$pw" != "success" ] && [ "$pw" != "failure" ]; then
            echo "Skipping sheet update: Playwright step outcome is '$pw' (not success or failure)."
            exit 0
          fi
          if [ -z "${SHEETS_WEBHOOK_URL:-}" ] || [ -z "${WEBHOOK_SECRET:-}" ]; then
            echo "Skipping Google Sheet: set SHEETS_WEBHOOK_URL and WEBHOOK_SECRET in repo Actions secrets."
            exit 0
          fi
          if [ "$pw" = "success" ]; then
            RESULT="Pass"
          else
            RESULT="Fail"
          fi
          echo "Posting TC-LP-001 as $RESULT to sheet Login (Playwright outcome=$pw)."
          payload="$(jq -n \
            --arg secret "$WEBHOOK_SECRET" \
            --arg testCaseId "TC-LP-001" \
            --arg result "$RESULT" \
            --arg sheetName "Login" \
            '{secret: $secret, testCaseId: $testCaseId, result: $result, sheetName: $sheetName}')"
          # Apps Script /exec often responds with 302 → script.googleusercontent.com; follow it but keep POST + body
          # (--post302/--post303; plain -L would resend as GET and you get HTML instead of JSON).
          resp="$(curl -sS -L --post301 --post302 --post303 -X POST "$SHEETS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload")"
          echo "$resp"
          if ! echo "$resp" | jq -e . >/dev/null 2>&1; then
            echo "::error::Webhook response is not JSON (often wrong SHEETS_WEBHOOK_URL: use the Web App URL ending in /exec from Apps Script → Deploy → Manage deployments, not a Drive or script.google.com editor link)."
            exit 1
          fi
          echo "$resp" | jq -e '.ok == true' >/dev/null || {
            echo "::error::Google Sheet webhook returned ok!=true (e.g. test_case_not_found if TC-LP-001 is missing from tab Login)."
            echo "$resp" | jq .
            exit 1
          }
